# Harness Template Manifest
# Version: 3.1
#
# Used by `run-harness-bootstrap` (agent command) to drive project customization
# after an IDE-specific bootstrap script has been run.

scripts:
  cursor:
    path: .harness/bin/setup.sh
    does:
      - creates .cursor/ symlinks via .harness/bin/setup.sh

configure:
  - dest: .harness/pipeline.yaml
    notes: >
      Replace the placeholder commands with your project's actual commands
      for format, lint, test, build, and any product-run scripts the red-team
      or persona workflows will need.

runtime:
  - .harness/runs/
  - .harness/pr_descriptions/
  - .harness/change_summaries/
  - .harness/state/
  - .cursor/

knowledge:
  - .harness/ledgers/INDEX.json
  - .harness/ledgers/INDEX.md
  - .harness/ledgers/DOC_SYNC_STATE.json
  - .harness/ledgers/*.md
  - .harness/contracts/INDEX.json
  - .harness/contracts/INDEX.md
  - .harness/contracts/README.md
  - .harness/product-feedback/RECOMMENDATION_REGISTRY.json
  - .harness/product-feedback/RECOMMENDATION_REGISTRY.md
  - .harness/product-feedback/README.md
  - .harness/product-feedback/CUSTOMER_PERSONA_SPEC.md
  - .harness/docs/index.md
