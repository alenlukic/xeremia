name: dj-tools
version: 7
min_supported_version: 5
changelog: HARNESS_CHANGELOG.md
changelog_json: HARNESS_CHANGELOG.json
summary: dj-tools harness with runtime bootstrap bundles, host model-compatibility routing, and contract-first delivery DAG orchestration.

bootstrap:
  cursor: bin/bootstrap-cursor.sh
  claude: bin/bootstrap-claude.sh
  codex: bin/bootstrap-codex.sh

scheduler_installers:
  cron: bin/install-cron-housekeeping.sh
  systemd: bin/install-systemd-housekeeping.sh
  launchd: bin/install-launchd-housekeeping.sh

critical_paths:
  - .harness/INDEX.md
  - .harness/GLOSSARY.md
  - .harness/control/pipeline.yaml
  - .harness/control/runtime/
  - .harness/spec/agents/
  - .harness/spec/commands/
  - .harness/intake/
  - .harness/workspace/inbox/
  - .harness/workspace/contracts/
  - .harness/workspace/work/
  - .harness/knowledge/memory/
  - .harness/history/ledgers/
  - .harness/history/runs/
