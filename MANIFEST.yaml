# Harness Template Manifest
# Version: 4.0
#
# Used by `run-harness-bootstrap` (agent command) to drive project customization
# after an IDE-specific bootstrap script has been run.

scripts:
  cursor:
    path: .harness/control/bin/setup.sh
    does:
      - creates .cursor/ symlinks via .harness/control/bin/setup.sh

configure:
  - dest: .harness/control/pipeline.yaml
    notes: >
      Replace the placeholder commands with your project's actual commands
      for format, lint, test, build, and any product-run scripts the red-team
      or persona workflows will need.

runtime:
  - .harness/history/runs/
  - .harness/history/pr_descriptions/
  - .harness/knowledge/state/
  - .cursor/

knowledge:
  - .harness/history/ledgers/INDEX.json
  - .harness/history/ledgers/INDEX.md
  - .harness/history/ledgers/DOC_SYNC_STATE.json
  - .harness/history/ledgers/*.md
  - .harness/workspace/contracts/INDEX.json
  - .harness/workspace/contracts/INDEX.md
  - .harness/workspace/contracts/README.md
  - .harness/workspace/product-feedback/RECOMMENDATION_REGISTRY.json
  - .harness/workspace/product-feedback/RECOMMENDATION_REGISTRY.md
  - .harness/workspace/product-feedback/README.md
  - .harness/workspace/product-feedback/CUSTOMER_PERSONA_SPEC.md
  - .harness/knowledge/docs/index.md
